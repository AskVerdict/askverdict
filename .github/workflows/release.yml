name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm-publish
    if: "!startsWith(github.event.head_commit.message, 'ci: version packages')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Configure npm for publishing
        run: npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Auto-generate changeset if missing
        id: auto-changeset
        run: |
          EXISTING=$(ls .changeset/*.md 2>/dev/null | grep -v README.md | head -1 || true)
          if [ -n "$EXISTING" ]; then
            echo "Changeset already exists, skipping auto-generation"
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files detected"
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PACKAGES=""
          if echo "$CHANGED_FILES" | grep -q "^packages/types/"; then
            PACKAGES="$PACKAGES \"@askverdict/types\": patch"$'\n'
          fi
          if echo "$CHANGED_FILES" | grep -q "^packages/sdk/"; then
            PACKAGES="$PACKAGES \"@askverdict/sdk\": patch"$'\n'
          fi
          if echo "$CHANGED_FILES" | grep -q "^packages/cli/"; then
            PACKAGES="$PACKAGES \"@askverdict/cli\": patch"$'\n'
          fi
          if echo "$CHANGED_FILES" | grep -q "^packages/verdict/"; then
            PACKAGES="$PACKAGES \"askverdict\": patch"$'\n'
          fi

          # If types changed, also bump sdk and cli (they depend on types)
          if echo "$CHANGED_FILES" | grep -q "^packages/types/"; then
            if ! echo "$PACKAGES" | grep -q "@askverdict/sdk"; then
              PACKAGES="$PACKAGES \"@askverdict/sdk\": patch"$'\n'
            fi
            if ! echo "$PACKAGES" | grep -q "@askverdict/cli"; then
              PACKAGES="$PACKAGES \"@askverdict/cli\": patch"$'\n'
            fi
          fi

          if [ -z "$PACKAGES" ]; then
            echo "No publishable package changes detected"
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          CHANGESET_FILE=".changeset/auto-$(date +%s).md"
          {
            echo "---"
            echo "$PACKAGES"
            echo "---"
            echo ""
            echo "$COMMIT_MSG"
          } > "$CHANGESET_FILE"

          echo "Generated changeset: $CHANGESET_FILE"
          cat "$CHANGESET_FILE"
          echo "generated=true" >> "$GITHUB_OUTPUT"

      - name: Version packages
        run: pnpm version-packages

      - name: Publish to npm
        id: publish
        run: |
          pnpm release 2>&1 | tee /tmp/publish-output.txt
          # Check if anything was published
          if grep -q "New tag:" /tmp/publish-output.txt 2>/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "ci: version packages"
            git push
          fi

      - name: Create git tags
        run: |
          # Tag any newly published packages
          for pkg_dir in packages/*/; do
            PKG_JSON="$pkg_dir/package.json"
            if [ ! -f "$PKG_JSON" ]; then continue; fi
            NAME=$(node -e "console.log(require('./$PKG_JSON').name)")
            VERSION=$(node -e "console.log(require('./$PKG_JSON').version)")
            TAG="$NAME@$VERSION"
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              git tag "$TAG" || true
            fi
          done
          git push --tags || true
