name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm-publish
    if: "!startsWith(github.event.head_commit.message, 'ci: version packages')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Configure npm for publishing
        run: |
          npm install -g npm@latest
          npm config set registry https://registry.npmjs.org/
          npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Auto-generate changeset if missing
        id: auto-changeset
        run: |
          EXISTING=$(ls .changeset/*.md 2>/dev/null | grep -v README.md | head -1 || true)
          if [ -n "$EXISTING" ]; then
            echo "Changeset already exists, skipping auto-generation"
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files detected"
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PACKAGES=""
          if echo "$CHANGED_FILES" | grep -q "^packages/types/"; then
            PACKAGES="$PACKAGES \"@askverdict/types\": patch"$'\n'
          fi
          if echo "$CHANGED_FILES" | grep -q "^packages/sdk/"; then
            PACKAGES="$PACKAGES \"@askverdict/sdk\": patch"$'\n'
          fi
          if echo "$CHANGED_FILES" | grep -q "^packages/cli/"; then
            PACKAGES="$PACKAGES \"@askverdict/cli\": patch"$'\n'
          fi
          if echo "$CHANGED_FILES" | grep -q "^packages/verdict/"; then
            PACKAGES="$PACKAGES \"verdict\": patch"$'\n'
          fi

          # If types changed, also bump sdk and cli (they depend on types)
          if echo "$CHANGED_FILES" | grep -q "^packages/types/"; then
            if ! echo "$PACKAGES" | grep -q "@askverdict/sdk"; then
              PACKAGES="$PACKAGES \"@askverdict/sdk\": patch"$'\n'
            fi
            if ! echo "$PACKAGES" | grep -q "@askverdict/cli"; then
              PACKAGES="$PACKAGES \"@askverdict/cli\": patch"$'\n'
            fi
          fi

          if [ -z "$PACKAGES" ]; then
            echo "No publishable package changes detected"
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          CHANGESET_FILE=".changeset/auto-$(date +%s).md"
          {
            echo "---"
            echo "$PACKAGES"
            echo "---"
            echo ""
            echo "$COMMIT_MSG"
          } > "$CHANGESET_FILE"

          echo "Generated changeset: $CHANGESET_FILE"
          cat "$CHANGESET_FILE"
          echo "generated=true" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Version and Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "ci: version packages"
          title: "ci: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tags for release
        if: steps.changesets.outputs.published == 'true'
        run: |
          PUBLISHED='${{ steps.changesets.outputs.publishedPackages }}'
          if [ -n "$PUBLISHED" ] && [ "$PUBLISHED" != "[]" ]; then
            echo "$PUBLISHED" | jq -r '.[] | "\(.name)@\(.version)"' | while read TAG; do
              if ! git rev-parse "$TAG" >/dev/null 2>&1; then
                git tag "$TAG"
                git push origin "$TAG" || true
              fi
            done
          fi
